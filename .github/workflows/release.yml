name: release

# Triggered by pushing a SemVer-shaped tag, e.g. ``git tag v0.1.0 && git push --tags``.
# Builds the wheel + sdist, publishes to PyPI via Trusted Publishing (no API
# tokens stored as secrets), and builds + pushes a multi-arch Docker image to
# the GitHub Container Registry tagged with the same version (and ``latest``).
#
# Required one-time setup outside the repo:
#   * On PyPI: configure a "Trusted Publisher" pointing at this repo + workflow.
#     https://docs.pypi.org/trusted-publishers/
#   * No GHCR setup needed beyond the default ``GITHUB_TOKEN`` write permission.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1). Optional for manual runs."
        required: false

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify version matches tag
        id: meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-}"
          if [[ -z "$tag" ]]; then tag="${{ github.event.inputs.tag }}"; fi
          version="${tag#v}"
          pkg_version=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [[ -n "$version" && "$version" != "$pkg_version" ]]; then
            echo "::error::tag $tag does not match pyproject version $pkg_version"
            exit 1
          fi
          echo "version=$pkg_version" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lighter-mcp
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-ghcr:
    name: Build & push Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          repo="ghcr.io/${{ github.repository }}"
          repo_lc="${repo,,}"
          version="${{ needs.build.outputs.version }}"
          tags="$repo_lc:$version,$repo_lc:latest"
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub release
    needs: [publish-pypi, publish-ghcr]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
